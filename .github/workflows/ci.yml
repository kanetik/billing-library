name: CI

# Runs on every PR and on every push to main.
# Job: build the release AAR, run lint, run unit tests.
# No publishing — that's publish.yml on tag push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue moving when
# someone force-pushes a PR or pushes multiple commits in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Gradle daemon)
        uses: actions/setup-java@v4
        with:
          # Gradle 9.x requires JDK 17+ to run the build daemon, but the
          # produced AAR still targets JDK 11 (see `jvmToolchain(11)` in
          # billing/build.gradle.kts). The foojay-resolver-convention plugin
          # in settings.gradle.kts auto-downloads JDK 11 for compilation —
          # we only need JDK 17 here for the daemon itself.
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        # Handles wrapper validation, dep cache, and Gradle daemon configuration.
        uses: gradle/actions/setup-gradle@v4
        with:
          # Cache only on the default branch — PR caches eat the GH Actions
          # cache budget without much hit-rate benefit.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble release AAR
        run: ./gradlew :billing:assembleRelease

      - name: Lint
        run: ./gradlew :billing:lint

      - name: Unit tests
        run: ./gradlew :billing:test

      - name: Assemble sample debug APK
        # Catches library API changes that break the sample without us
        # noticing. Sample isn't published; this is purely a regression net.
        run: ./gradlew :sample:assembleDebug

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: billing/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7
